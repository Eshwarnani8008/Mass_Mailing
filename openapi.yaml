openapi: "3.0.3"
info:
  title: EmailIntel Enterprise API
  version: "1.0.0"
  description: Production-grade multi-tenant email intelligence platform

servers:
  - url: http://localhost:8000
    description: Local development (via API Gateway)

security:
  - BearerAuth: []

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Tenant:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        domain:
          type: string
        plan:
          type: string
          enum: [free, starter, pro, enterprise]
        status:
          type: string
          enum: [active, suspended, cancelled]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        tenantId:
          type: string
          format: uuid
        email:
          type: string
          format: email
        name:
          type: string
        role:
          type: string
          enum: [owner, admin, member, viewer]
        mfaEnabled:
          type: boolean
        createdAt:
          type: string
          format: date-time

    ApiKey:
      type: object
      properties:
        id:
          type: string
          format: uuid
        tenantId:
          type: string
          format: uuid
        name:
          type: string
        keyPrefix:
          type: string
        scopes:
          type: array
          items:
            type: string
        lastUsedAt:
          type: string
          format: date-time
        expiresAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time

    VerificationResult:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        status:
          type: string
          enum: [valid, invalid, risky, unknown]
        score:
          type: number
          minimum: 0
          maximum: 100
        checks:
          type: object
          properties:
            syntax:
              type: boolean
            dns:
              type: boolean
            mx:
              type: boolean
            smtp:
              type: boolean
            disposable:
              type: boolean
            roleAccount:
              type: boolean
            freeProvider:
              type: boolean
        domain:
          type: string
        mxRecords:
          type: array
          items:
            type: string
        suggestion:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time

    BulkJob:
      type: object
      properties:
        id:
          type: string
          format: uuid
        tenantId:
          type: string
          format: uuid
        filename:
          type: string
        status:
          type: string
          enum: [queued, processing, completed, failed, cancelled]
        totalRecords:
          type: integer
        processedRecords:
          type: integer
        validCount:
          type: integer
        invalidCount:
          type: integer
        riskyCount:
          type: integer
        unknownCount:
          type: integer
        progress:
          type: number
          minimum: 0
          maximum: 100
        createdAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
          nullable: true

    WebhookConfig:
      type: object
      properties:
        id:
          type: string
          format: uuid
        tenantId:
          type: string
          format: uuid
        url:
          type: string
          format: uri
        events:
          type: array
          items:
            type: string
            enum: [verification.completed, bulk.completed, bulk.failed, quota.warning, quota.exceeded]
        secret:
          type: string
        active:
          type: boolean
        createdAt:
          type: string
          format: date-time

    WebhookDelivery:
      type: object
      properties:
        id:
          type: string
          format: uuid
        webhookId:
          type: string
          format: uuid
        event:
          type: string
        payload:
          type: object
        statusCode:
          type: integer
          nullable: true
        response:
          type: string
          nullable: true
        success:
          type: boolean
        attempts:
          type: integer
        createdAt:
          type: string
          format: date-time

    AuditLog:
      type: object
      properties:
        id:
          type: string
          format: uuid
        tenantId:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
          nullable: true
        action:
          type: string
        resource:
          type: string
        resourceId:
          type: string
          nullable: true
        ipAddress:
          type: string
        userAgent:
          type: string
        metadata:
          type: object
        createdAt:
          type: string
          format: date-time

    Quota:
      type: object
      properties:
        plan:
          type: string
        monthlyLimit:
          type: integer
        used:
          type: integer
        remaining:
          type: integer
        resetAt:
          type: string
          format: date-time

    Error:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
        statusCode:
          type: integer
        details:
          type: object

    Pagination:
      type: object
      properties:
        page:
          type: integer
        limit:
          type: integer
        total:
          type: integer
        totalPages:
          type: integer

paths:

  # ─── AUTH ────────────────────────────────────────────────────────────────────

  /api/auth/register:
    post:
      tags: [Auth]
      summary: Register a new tenant and admin user
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, password, tenantName]
              properties:
                name:
                  type: string
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 8
                tenantName:
                  type: string
      responses:
        "201":
          description: Registration successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: "#/components/schemas/User"
                  tenant:
                    $ref: "#/components/schemas/Tenant"
                  accessToken:
                    type: string
                  refreshToken:
                    type: string
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Email already registered

  /api/auth/login:
    post:
      tags: [Auth]
      summary: Authenticate and receive JWT tokens
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                mfaCode:
                  type: string
                  description: Required if MFA is enabled
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: "#/components/schemas/User"
                  accessToken:
                    type: string
                  refreshToken:
                    type: string
                  mfaRequired:
                    type: boolean
        "401":
          description: Invalid credentials
        "403":
          description: MFA code required or invalid

  /api/auth/logout:
    post:
      tags: [Auth]
      summary: Invalidate the current session
      responses:
        "204":
          description: Logged out successfully

  /api/auth/refresh:
    post:
      tags: [Auth]
      summary: Exchange a refresh token for a new access token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken:
                  type: string
      responses:
        "200":
          description: New access token issued
          content:
            application/json:
              schema:
                type: object
                properties:
                  accessToken:
                    type: string
        "401":
          description: Invalid or expired refresh token

  /api/auth/me:
    get:
      tags: [Auth]
      summary: Get current authenticated user profile
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /api/auth/mfa/setup:
    post:
      tags: [Auth]
      summary: Initialize MFA setup — returns TOTP secret and QR code URI
      responses:
        "200":
          description: MFA setup data
          content:
            application/json:
              schema:
                type: object
                properties:
                  secret:
                    type: string
                  qrCodeUri:
                    type: string
                  backupCodes:
                    type: array
                    items:
                      type: string

  /api/auth/mfa/verify:
    post:
      tags: [Auth]
      summary: Confirm MFA setup with a TOTP code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code]
              properties:
                code:
                  type: string
      responses:
        "200":
          description: MFA enabled
        "400":
          description: Invalid code

  # ─── TENANT ──────────────────────────────────────────────────────────────────

  /api/tenants/me:
    get:
      tags: [Tenant]
      summary: Get current tenant details
      responses:
        "200":
          description: Tenant object
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tenant"
    patch:
      tags: [Tenant]
      summary: Update tenant settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                domain:
                  type: string
      responses:
        "200":
          description: Updated tenant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tenant"

  /api/tenants/users:
    get:
      tags: [Tenant]
      summary: List users in the current tenant
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Paginated user list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/User"
                  pagination:
                    $ref: "#/components/schemas/Pagination"
    post:
      tags: [Tenant]
      summary: Invite a user to the tenant
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, role]
              properties:
                email:
                  type: string
                  format: email
                role:
                  type: string
                  enum: [admin, member, viewer]
      responses:
        "201":
          description: Invitation sent

  /api/tenants/api-keys:
    get:
      tags: [Tenant]
      summary: List API keys for the tenant
      responses:
        "200":
          description: API key list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ApiKey"
    post:
      tags: [Tenant]
      summary: Create a new API key
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                scopes:
                  type: array
                  items:
                    type: string
                expiresAt:
                  type: string
                  format: date-time
      responses:
        "201":
          description: Created API key (secret shown once)
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiKey"
                  - type: object
                    properties:
                      secret:
                        type: string

  /api/tenants/quota:
    get:
      tags: [Tenant]
      summary: Get current quota usage
      responses:
        "200":
          description: Quota object
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Quota"

  # ─── VERIFY ──────────────────────────────────────────────────────────────────

  /api/verify:
    post:
      tags: [Verify]
      summary: Verify a single email address
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
      responses:
        "200":
          description: Verification result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerificationResult"
        "402":
          description: Quota exceeded

  /api/verify/batch:
    post:
      tags: [Verify]
      summary: Verify up to 100 emails in a single request
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [emails]
              properties:
                emails:
                  type: array
                  items:
                    type: string
                    format: email
                  maxItems: 100
      responses:
        "200":
          description: Array of verification results
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/VerificationResult"

  /api/verify/history:
    get:
      tags: [Verify]
      summary: List past verifications for the tenant
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 50
        - in: query
          name: status
          schema:
            type: string
            enum: [valid, invalid, risky, unknown]
        - in: query
          name: from
          schema:
            type: string
            format: date
        - in: query
          name: to
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Paginated verification history
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/VerificationResult"
                  pagination:
                    $ref: "#/components/schemas/Pagination"

  /api/verify/{id}:
    get:
      tags: [Verify]
      summary: Get a single verification result by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Verification result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerificationResult"
        "404":
          description: Not found

  # ─── BULK ─────────────────────────────────────────────────────────────────────

  /api/bulk/upload:
    post:
      tags: [Bulk]
      summary: Upload a CSV file for bulk email verification
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: CSV file with one email per row (max 500 000 rows)
      responses:
        "202":
          description: Job accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkJob"

  /api/bulk/jobs:
    get:
      tags: [Bulk]
      summary: List bulk verification jobs
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
        - in: query
          name: status
          schema:
            type: string
            enum: [queued, processing, completed, failed, cancelled]
      responses:
        "200":
          description: Paginated job list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/BulkJob"
                  pagination:
                    $ref: "#/components/schemas/Pagination"

  /api/bulk/jobs/{id}:
    get:
      tags: [Bulk]
      summary: Get status and progress of a bulk job
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Bulk job
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkJob"
        "404":
          description: Not found
    delete:
      tags: [Bulk]
      summary: Cancel a queued or processing bulk job
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Job cancelled

  /api/bulk/jobs/{id}/download:
    get:
      tags: [Bulk]
      summary: Download the result CSV for a completed bulk job
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: CSV file stream
          content:
            text/csv:
              schema:
                type: string
                format: binary
        "404":
          description: Not found
        "409":
          description: Job not yet completed

  # ─── ANALYTICS ───────────────────────────────────────────────────────────────

  /api/analytics/dashboard:
    get:
      tags: [Analytics]
      summary: Aggregate dashboard metrics for the tenant
      responses:
        "200":
          description: Dashboard stats
          content:
            application/json:
              schema:
                type: object
                properties:
                  totalVerifications:
                    type: integer
                  validPercent:
                    type: number
                  invalidPercent:
                    type: number
                  riskyPercent:
                    type: number
                  quotaUsed:
                    type: integer
                  quotaRemaining:
                    type: integer
                  recentActivity:
                    type: array
                    items:
                      type: object

  /api/analytics/daily:
    get:
      tags: [Analytics]
      summary: Daily verification counts for a date range
      parameters:
        - in: query
          name: from
          required: true
          schema:
            type: string
            format: date
        - in: query
          name: to
          required: true
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Daily time-series data
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    date:
                      type: string
                      format: date
                    valid:
                      type: integer
                    invalid:
                      type: integer
                    risky:
                      type: integer
                    unknown:
                      type: integer

  /api/analytics/domains:
    get:
      tags: [Analytics]
      summary: Top verified domains breakdown
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Domain statistics
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    domain:
                      type: string
                    count:
                      type: integer
                    validPercent:
                      type: number

  /api/analytics/results:
    get:
      tags: [Analytics]
      summary: Breakdown of verification result categories
      responses:
        "200":
          description: Result distribution
          content:
            application/json:
              schema:
                type: object
                properties:
                  valid:
                    type: integer
                  invalid:
                    type: integer
                  risky:
                    type: integer
                  unknown:
                    type: integer

  /api/analytics/export:
    get:
      tags: [Analytics]
      summary: Export analytics data as CSV
      parameters:
        - in: query
          name: from
          schema:
            type: string
            format: date
        - in: query
          name: to
          schema:
            type: string
            format: date
        - in: query
          name: type
          schema:
            type: string
            enum: [daily, domains, results]
            default: daily
      responses:
        "200":
          description: CSV export
          content:
            text/csv:
              schema:
                type: string
                format: binary

  # ─── WEBHOOKS ────────────────────────────────────────────────────────────────

  /api/webhooks:
    get:
      tags: [Webhooks]
      summary: List webhooks for the tenant
      responses:
        "200":
          description: Webhook list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WebhookConfig"
    post:
      tags: [Webhooks]
      summary: Create a new webhook
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [url, events]
              properties:
                url:
                  type: string
                  format: uri
                events:
                  type: array
                  items:
                    type: string
                    enum: [verification.completed, bulk.completed, bulk.failed, quota.warning, quota.exceeded]
                secret:
                  type: string
                  description: HMAC signing secret (auto-generated if omitted)
      responses:
        "201":
          description: Created webhook
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookConfig"

  /api/webhooks/{id}:
    get:
      tags: [Webhooks]
      summary: Get a webhook by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Webhook
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookConfig"
    patch:
      tags: [Webhooks]
      summary: Update a webhook
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                url:
                  type: string
                  format: uri
                events:
                  type: array
                  items:
                    type: string
                active:
                  type: boolean
      responses:
        "200":
          description: Updated webhook
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookConfig"
    delete:
      tags: [Webhooks]
      summary: Delete a webhook
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Deleted

  /api/webhooks/{id}/test:
    post:
      tags: [Webhooks]
      summary: Send a test event to the webhook endpoint
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Test delivery result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookDelivery"

  /api/webhooks/{id}/deliveries:
    get:
      tags: [Webhooks]
      summary: List recent deliveries for a webhook
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Delivery list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/WebhookDelivery"
                  pagination:
                    $ref: "#/components/schemas/Pagination"

  # ─── AUDIT ───────────────────────────────────────────────────────────────────

  /api/audit/logs:
    get:
      tags: [Audit]
      summary: List audit log entries for the tenant
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 50
        - in: query
          name: action
          schema:
            type: string
        - in: query
          name: userId
          schema:
            type: string
            format: uuid
        - in: query
          name: from
          schema:
            type: string
            format: date-time
        - in: query
          name: to
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: Paginated audit logs
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/AuditLog"
                  pagination:
                    $ref: "#/components/schemas/Pagination"

  /api/audit/logs/{id}:
    get:
      tags: [Audit]
      summary: Get a single audit log entry
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Audit log entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditLog"
        "404":
          description: Not found

  # ─── ADMIN ───────────────────────────────────────────────────────────────────

  /api/admin/tenants:
    get:
      tags: [Admin]
      summary: List all tenants (super-admin only)
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
        - in: query
          name: status
          schema:
            type: string
            enum: [active, suspended, cancelled]
      responses:
        "200":
          description: Paginated tenant list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Tenant"
                  pagination:
                    $ref: "#/components/schemas/Pagination"

  /api/admin/stats:
    get:
      tags: [Admin]
      summary: Platform-wide usage statistics (super-admin only)
      responses:
        "200":
          description: Platform stats
          content:
            application/json:
              schema:
                type: object
                properties:
                  totalTenants:
                    type: integer
                  activeTenants:
                    type: integer
                  totalVerifications:
                    type: integer
                  verificationsToday:
                    type: integer
                  activeBulkJobs:
                    type: integer

  /api/admin/fraud:
    get:
      tags: [Admin]
      summary: Fraud signals and suspicious tenant activity (super-admin only)
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Fraud reports
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                  pagination:
                    $ref: "#/components/schemas/Pagination"

  # ─── SUPPRESSION ─────────────────────────────────────────────────────────────

  /api/suppression:
    get:
      tags: [Suppression]
      summary: List suppressed email addresses for the tenant
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: Suppression list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        email:
                          type: string
                          format: email
                        reason:
                          type: string
                        addedAt:
                          type: string
                          format: date-time
                  pagination:
                    $ref: "#/components/schemas/Pagination"
    post:
      tags: [Suppression]
      summary: Add an email to the suppression list
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
                reason:
                  type: string
      responses:
        "201":
          description: Email suppressed

  /api/suppression/check:
    post:
      tags: [Suppression]
      summary: Check whether an email is on the suppression list
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
      responses:
        "200":
          description: Suppression check result
          content:
            application/json:
              schema:
                type: object
                properties:
                  email:
                    type: string
                  suppressed:
                    type: boolean
                  reason:
                    type: string
                    nullable: true

  /api/suppression/upload:
    post:
      tags: [Suppression]
      summary: Bulk-upload a CSV of emails to suppress
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "202":
          description: Upload accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  imported:
                    type: integer
                  skipped:
                    type: integer

  # ─── BILLING ─────────────────────────────────────────────────────────────────

  /api/billing/subscription:
    get:
      tags: [Billing]
      summary: Get current subscription details
      responses:
        "200":
          description: Subscription
          content:
            application/json:
              schema:
                type: object
                properties:
                  plan:
                    type: string
                  status:
                    type: string
                  currentPeriodStart:
                    type: string
                    format: date-time
                  currentPeriodEnd:
                    type: string
                    format: date-time
                  cancelAtPeriodEnd:
                    type: boolean
    patch:
      tags: [Billing]
      summary: Change subscription plan
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [plan]
              properties:
                plan:
                  type: string
                  enum: [starter, pro, enterprise]
      responses:
        "200":
          description: Updated subscription

  /api/billing/invoices:
    get:
      tags: [Billing]
      summary: List invoices for the tenant
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 12
      responses:
        "200":
          description: Invoice list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        amount:
                          type: number
                        currency:
                          type: string
                        status:
                          type: string
                          enum: [draft, open, paid, void, uncollectible]
                        pdfUrl:
                          type: string
                          format: uri
                        createdAt:
                          type: string
                          format: date-time
                  pagination:
                    $ref: "#/components/schemas/Pagination"

  /api/billing/usage:
    get:
      tags: [Billing]
      summary: Get detailed usage metrics for billing purposes
      parameters:
        - in: query
          name: month
          schema:
            type: string
            pattern: "^\\d{4}-\\d{2}$"
            description: "Month in YYYY-MM format, defaults to current month"
      responses:
        "200":
          description: Usage data
          content:
            application/json:
              schema:
                type: object
                properties:
                  month:
                    type: string
                  verificationsUsed:
                    type: integer
                  bulkJobsRun:
                    type: integer
                  apiCallsTotal:
                    type: integer
                  overage:
                    type: integer
